<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Movie</title>
  </head>
  <body>
    <div class="grid-init grid">
      <header class="header">
        <div class="header_wrap">
          <a href="#" class="header_logo">MOVEA</a>
          <nav class="header_nav">
            <a href="#">Movies</a>
            <a href="#">TV shows</a>
            <a href="#">Animations</a>
            <a href="#">Plans</a>
          </nav>
          <div class="header_find">
            <input type="text" placeholder="Search..." />
          </div>
          <div class="header_date">
            <div class="header_hours">19:55</div>
            <div class="header_days">March 30</div>
          </div>
          <div class="header_personal">
            <img src="img/avatar.png" alt="Тут должна быть твоя иконка..." />
          </div>
        </div>
      </header>
      <aside class="aside box-init">aside</aside>
      <main class="main">
        <section class="main_display">
          <div class="main_display_trailer">
            <div class="main_display_views">Views 77k</div>
            <div class="main_display_name">
              <h1 class="main_display_header">Spider-Man: No Way Home</h1>
              <div class="main_display_date">Feb 2021</div>
            </div>
            <div class="button_play_wrap">
              <div class="button_play"></div>
            </div>
          </div>
          <div class="main_display_trending"></div>
          <div class="main_display_trending"></div>
        </section>
      </main>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
